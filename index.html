<script>
const fmt = n => n.toLocaleString("ko-KR");
let DATA = null;
let VIEW = "high";  /* high = 愿대━???곸쐞, low = ?섏쐞 */

async function load(){
  try{
    const res = await fetch("data.json", {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP " + res.status);
    DATA = await res.json();
    document.getElementById("updated").textContent = DATA.updated_at + " 媛깆떊";
    document.getElementById("stats").hidden = false;
    document.getElementById("tabs").hidden = false;
    document.getElementById("controls").hidden = false;
    render();
  }catch(e){
    document.getElementById("list").innerHTML =
      '<div class="error">data.json??遺덈윭?ㅼ? 紐삵뻽?듬땲??<br>' +
      '濡쒖뺄?먯꽌 ?щ뒗 寃쎌슦 ?뚯씪???붾툝?대┃?섏? 留먭퀬, ?곕??먯뿉??br>' +
      '<code>python -m http.server</code> ?ㅽ뻾 ??<code>http://localhost:8000</code>?쇰줈 ?묒냽?섏꽭??</div>';
  }
}

function render(){
  const sortBy = document.getElementById("sort").value;
  const multiOnly = document.getElementById("multiOnly").checked;

  let rows = DATA.rows.slice();
  if(multiOnly) rows = rows.filter(r => r.report_count >= 2);
  if(document.getElementById("hideSuspect").checked) rows = rows.filter(r => !r.suspect);

  if(sortBy === "gap"){
    rows.sort((a,b) => VIEW === "low" ? a.gap_pct - b.gap_pct : b.gap_pct - a.gap_pct);
  }
  if(sortBy === "reports")  rows.sort((a,b) => b.report_count - a.report_count || b.gap_pct - a.gap_pct);
  if(sortBy === "name")     rows.sort((a,b) => a.name.localeCompare(b.name, "ko"));

  const note = document.getElementById("viewNote");
  note.hidden = VIEW !== "low";
  note.textContent = "紐⑺몴二쇨?媛 ?꾩옱媛? 媛源앷굅????? 醫낅ぉ ???좊꼸由ъ뒪?멸? ?곷??곸쑝濡??좎쨷?섍쾶 蹂대뒗 援ш컙?낅땲??";

  /* ?붿빟 吏?쒕뒗 ?꾩옱 ?꾪꽣 湲곗??쇰줈 怨꾩궛 */
  const avg = rows.length ? rows.reduce((s,r)=>s+r.gap_pct,0)/rows.length : 0;
  const max = rows.length ? Math.max(...rows.map(r=>r.gap_pct)) : 0;
  document.getElementById("stat-count").textContent = rows.length + "媛?;
  document.getElementById("stat-avg").textContent = (avg>=0?"+":"") + avg.toFixed(1) + "%";
  document.getElementById("stat-max").textContent = (max>=0?"+":"") + max.toFixed(1) + "%";
  document.getElementById("countNote").textContent = rows.length + "醫낅ぉ ?쒖떆 以?;

  const list = document.getElementById("list");
  if(!rows.length){
    list.innerHTML = '<div class="loading">議곌굔??留욌뒗 醫낅ぉ???놁뒿?덈떎. ?꾪꽣瑜??댁젣??蹂댁꽭??</div>';
    return;
  }

  list.innerHTML = rows.map((r, i) => {
    /* 媛?諛?醫뚰몴: 0% = 0?? 100% = 紐⑺몴理쒓퀬媛??105% */
    const span = r.target_max * 1.05;
    const px = v => Math.min(97, Math.max(3, v / span * 100));
    const curX  = px(r.current_price);
    const minX  = px(r.target_min);
    const maxX  = px(r.target_max);
    const avgX  = px(r.target_avg);
    const negCls = r.gap_pct < 0 ? " neg" : "";
    const badge = (r.report_count >= 2
      ? '<span class="badge multi">由ы룷??' + r.report_count + '嫄?/span>'
      : '<span class="badge">由ы룷??1嫄?/span>')
      + (r.suspect ? '<span class="badge warn" title="愿대━?⑥씠 鍮꾩젙?곸쟻?쇰줈 而ㅼ꽌 紐⑺몴媛媛 理쒖떊 ?곹솴??諛섏쁺?섏? 紐삵뻽?????덉뒿?덈떎">寃利??꾩슂</span>' : '');

    const reports = r.reports.map(rep =>
      '<div class="report">' +
        '<span class="t">' + esc(rep.title) + '</span>' +
        '<span class="src">' + esc(rep.broker) + ' 쨌 ' + esc(rep.date) + '</span>' +
        '<span class="tp">' + fmt(rep.target_price) + '</span>' +
      '</div>'
    ).join("");

    const rangeNote = r.report_count >= 2
      ? '<div class="range-note">紐⑺몴媛 踰붿쐞 ' + fmt(r.target_min) + ' ~ ' + fmt(r.target_max) + ' 쨌 ?됯퇏 ' + fmt(r.target_avg) + '</div>'
      : '';

    return (
    '<div class="row" id="row-' + r.code + '">' +
      '<div class="row-main" role="button" tabindex="0" aria-expanded="false" onclick="toggleRow(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleRow(this);}">' +
        '<div class="name-cell">' +
          '<div class="rank">' + String(i+1).padStart(2,"0") + '</div>' +
          '<div class="name"><a href="https://finance.naver.com/item/main.naver?code=' + esc(r.code) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="?ㅼ씠踰?湲덉쑖?먯꽌 蹂닿린">' + esc(r.name) + '</a>' + badge + '</div>' +
          '<div class="meta">?꾩옱媛 ' + fmt(r.current_price) + '</div>' +
        '</div>' +
        '<div class="gapbar" aria-hidden="true">' +
          '<div class="track"></div>' +
          '<div class="bandfill" style="left:' + minX + '%; width:' + Math.max(0.6, maxX-minX) + '%;"></div>' +
          '<div class="cur" style="left:' + curX + '%;"></div>' +
          '<div class="tgt" style="left:' + avgX + '%;"></div>' +
          '<div class="lab-cur" style="left:' + curX + '%;">?꾩옱 ' + fmt(r.current_price) + '</div>' +
          '<div class="lab-tgt" style="left:' + avgX + '%;">紐⑺몴 ' + fmt(r.target_avg) + '</div>' +
        '</div>' +
        '<div class="gap-cell">' +
          '<div class="pct' + negCls + '">' + (r.gap_pct>=0?"+":"") + r.gap_pct.toFixed(1) + '%</div>' +
          '<div class="chev">洹쇨굅 蹂닿린 ??/div>' +
        '</div>' +
      '</div>' +
      '<div class="row-detail">' + reports + rangeNote + '</div>' +
    '</div>');
  }).join("");
}

function toggleRow(el){
  const row = el.closest(".row");
  row.classList.toggle("open");
  el.setAttribute("aria-expanded", row.classList.contains("open"));
  el.querySelector(".chev").textContent = row.classList.contains("open") ? "?묎린 ?? : "洹쇨굅 蹂닿린 ??;
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("sort").addEventListener("change", render);
document.getElementById("multiOnly").addEventListener("change", render);
document.getElementById("hideSuspect").addEventListener("change", render);
document.querySelectorAll("#tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    VIEW = btn.dataset.view;
    document.querySelectorAll("#tabs button").forEach(b => {
      b.classList.toggle("active", b === btn);
      b.setAttribute("aria-selected", b === btn);
    });
