name: daily-crawl
on:
  schedule:
    - cron: '0 9 * * 1-5'   # UTC 9시 = 한국 저녁 6시, 평일
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python gap_tracker.py --crawl
      - name: commit and push
        run: |
          git config user.name "gap-tracker-bot"
          git config user.email "actions@github.com"
          git add data.json reports_history.json
          git diff --cached --quiet || git commit -m "data update $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
      - name: trigger pages rebuild
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
